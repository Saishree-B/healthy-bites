<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Bites - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="index.html" class="text-4xl font-bold text-teal-600">Healthy Bites</a>
            <h2 class="text-2xl font-bold mt-4 text-gray-700">Welcome back!</h2>
            <p class="text-gray-500">Sign in to continue your healthy journey.</p>
        </div>
        <form id="loginForm" class="bg-white shadow-lg rounded-lg px-8 pt-6 pb-8 mb-4">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="email">Email</label>
                <input class="shadow appearance-none border rounded w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-teal-500" id="email" type="email" placeholder="Your Email">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">Password</label>
                <input class="shadow appearance-none border rounded w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-teal-500" id="password" type="password" placeholder="Your Password">
            </div>
            <div class="flex items-center justify-between">
                <button class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-6 rounded-md focus:outline-none focus:shadow-outline transition-colors duration-300 w-full" type="submit">Sign In</button>
            </div>
            <p class="text-center text-gray-500 text-sm mt-4">
                Don't have an account? <a href="register.html" class="text-teal-600 hover:text-teal-800 font-semibold">Sign up here</a>.
            </p>
        </form>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
