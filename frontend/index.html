<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Bites - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-3xl font-bold text-teal-600">Healthy Bites</a>
            <div class="flex space-x-4">
                <a href="index.html" class="text-teal-600 hover:text-teal-800 font-semibold">Dashboard</a>
                <a href="community.html" class="text-gray-600 hover:text-gray-800">Community</a>
                <a href="addRecipe.html" class="bg-teal-600 text-white px-4 py-2 rounded-md hover:bg-teal-700">Add Recipe</a>
                <a href="profile.html" class="text-gray-600 hover:text-gray-800">Profile</a>
                <button id="logoutBtn" class="text-gray-600 hover:text-gray-800">Logout</button>
            </div>
        </div>
    </nav>
    <div class="container mx-auto px-6 py-8">
        <h1 class="text-4xl font-bold text-center text-teal-700 mb-2">Welcome Back!</h1>
        <p class="text-center text-gray-500 mb-10">Your healthy journey starts here.</p>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-lg shadow-lg flex items-center">
                <div class="bg-pink-100 text-pink-600 p-3 rounded-full mr-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <div>
                    <h2 class="text-lg font-semibold text-gray-700">Daily Calories</h2>
                    <p id="dailyCalories" class="text-3xl font-bold text-gray-900">0 kcal</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-lg flex items-center">
                <div class="bg-blue-100 text-blue-600 p-3 rounded-full mr-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <div>
                    <h2 class="text-lg font-semibold text-gray-700">Carbohydrate Goal</h2>
                    <p id="dailyCarbGoal" class="text-3xl font-bold text-gray-900">0 g</p>
                </div>
            </div>
            <a href="mealPlanner.html" class="bg-white p-6 rounded-lg shadow-lg flex items-center hover:shadow-xl transition-shadow duration-300">
                <div class="bg-green-100 text-green-600 p-3 rounded-full mr-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8l4-4 4 4V7" />
                    </svg>
                </div>
                <div>
                    <h2 class="text-lg font-semibold text-gray-700">Meal Planner</h2>
                    <p class="text-gray-500">Track your daily meals here.</p>
                </div>
            </a>
        </div>

        <h2 class="text-2xl font-bold text-gray-700 mb-6">Your Recipes</h2>
        <div id="recipe-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>
    <script src="./js/main.js"></script>
</body>
</html>
