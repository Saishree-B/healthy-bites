<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Recipe - Healthy Bites</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
   
</head>

<body class="bg-gray-100 font-sans leading-normal tracking-normal">
    <nav id="navbar" class="bg-white p-4 flex justify-between items-center shadow-md">
        <a href="index.html" class="text-2xl font-bold text-green-700">Healthy Bites</a>
        <div>
            <a href="index.html" class="mx-2 text-gray-700 hover:text-green-700">Dashboard</a>
            <a href="addRecipe.html" class="mx-2 text-gray-700 hover:text-green-700">Add Recipe</a>
            <a href="community.html" class="mx-2 text-gray-700 hover:text-green-700">Community</a>
            <a href="profile.html" class="mx-2 text-gray-700 hover:text-green-700">Profile</a>
            <a href="#" id="logout-btn" class="mx-2 text-red-500 hover:text-red-700"><i
                    class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <main class="container mx-auto mt-10 p-6 bg-white rounded-lg shadow-xl max-w-2xl">
        <h1 class="text-3xl font-bold text-center text-green-700 mb-6">Add a New Recipe</h1>
        <form id="add-recipe-form">
            <div class="mb-4">
                <label for="recipe-name" class="block text-gray-700 font-bold mb-2">Recipe Name</label>
                <input type="text" id="recipe-name"
                    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring focus:border-green-300"
                    required>
            </div>

            <div class="mb-4">
                <label for="ingredients" class="block text-gray-700 font-bold mb-2">Ingredients</label>
                <textarea id="ingredients" rows="4"
                    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring focus:border-green-300"
                    placeholder="Enter each ingredient on a new line (e.g., 1 cup flour, 2 eggs)" required></textarea>
            </div>

            <div class="mb-4">
                <label for="instructions" class="block text-gray-700 font-bold mb-2">Instructions</label>
                <textarea id="instructions" rows="6"
                    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring focus:border-green-300"
                    placeholder="Enter cooking instructions" required></textarea>
            </div>

            <div class="text-center">
                <button type="submit"
                    class="bg-green-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-green-700 focus:outline-none focus:ring focus:ring-green-300 transition duration-300">
                    Add Recipe & Get Nutrition Facts
                </button>
            </div>
        </form>
    </main>

    <script src="js/recipe.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
