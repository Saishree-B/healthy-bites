<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Bites - Meal Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-3xl font-bold text-teal-600">Healthy Bites</a>
            <div class="flex space-x-4">
                <a href="index.html" class="text-gray-600 hover:text-gray-800">Dashboard</a>
                <a href="community.html" class="text-gray-600 hover:text-gray-800">Community</a>
                <a href="addRecipe.html" class="bg-teal-600 text-white px-4 py-2 rounded-md hover:bg-teal-700">Add Recipe</a>
                <a href="profile.html" class="text-gray-600 hover:text-gray-800">Profile</a>
                <button id="logoutBtn" class="text-gray-600 hover:text-gray-800">Logout</button>
            </div>
        </div>
    </nav>
    <div class="container mx-auto px-6 py-8">
        <h1 class="text-4xl font-bold text-center text-teal-700 mb-2">My Meal Planner</h1>
        <p class="text-center text-gray-500 mb-10">Keep track of your meals today!</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-xl font-bold text-gray-700 mb-4">Today's Progress</h2>
                <div id="dailySummary" class="text-lg">
                    <p>Loading...</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-xl font-bold text-gray-700 mb-4">Add a Recipe to your Day</h2>
                <form id="addMealForm">
                    <div class="mb-4">
                        <label for="recipeSelect" class="block text-gray-700 text-sm font-bold mb-2">Your Recipes</label>
                        <select id="recipeSelect" class="shadow appearance-none border rounded w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-teal-500" required>
                            </select>
                    </div>
                    <div class="flex items-center justify-between">
                        <button type="submit" class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-6 rounded-md focus:outline-none focus:shadow-outline transition-colors duration-300">Add to Meal Plan</button>
                    </div>
                </form>
            </div>
        </div>

        <h2 class="text-2xl font-bold text-gray-700 mb-6">Today's Meals</h2>
        <div id="mealList" class="grid grid-cols-1 gap-4">
            </div>
    </div>
    <script src="js/mealPlanner.js"></script>
</body>
</html>
